<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AETHERIS icon</title>
  <desc id="desc">Neon A logo on a dark game interface background.</desc>
  <defs>
    <linearGradient id="bg" x1="74" y1="53" x2="438" y2="459" gradientUnits="userSpaceOnUse">
